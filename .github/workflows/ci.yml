name: CI

# Test gate for @betanyc/nys-openlegislation-mcp, mirroring BetaNYC's
# engineering standards (platform/system/engineering-standards.md in the main
# workspace). Enforces that the package builds cleanly and its hermetic test
# suite (`npm test`, which runs `tsc` then `node --test`) passes at BOTH ends of
# the declared Node range before code lands on main.
#
# Version safety: package.json declares `engines.node: ">=20"` with no ceiling.
# We test 20 and 22 — the actively-maintained LTS releases within that range.
# Node 18 reached End-of-Life on 2025-04-30 and is excluded intentionally, so CI
# only exercises supported runtimes; this matches the rest of BetaNYC's
# TypeScript MCP fleet (nyc-charter-laws-rules/.github/workflows/test.yml is the
# canonical precedent). The engines floor is now ">=20" — better-sqlite3 v12
# supports Node 20.x+ only — so the matrix and the floor agree. The tests are offline —
# dependencies.test.js reads only package.json/package-lock.json,
# search.test.js mocks `fetch` — so no API key or data/corpus.db is required in CI.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Actively-maintained LTS releases within engines.node: ">=20".
        # 20 = LTS floor tested, 22 = current LTS ceiling. Node 18 is EOL
        # (2025-04-30) and excluded — see the header comment.
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm test
